<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards Responsivas</title>
    <link rel="stylesheet" href="./css/Card.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="imagenes">
          <img src="img/BirdCool.jpeg" alt="Imagen 1" />
          <img src="img/CatCoffe.jpeg" alt="Imagen 2" />
        </div>
        <div class="contenido">
          <h3 class="subtitulo">Subtítulo de la Card</h3>
          <p class="descripcion">
            Esta es una descripción de ejemplo para la card. Puedes colocar
            información sobre el contenido.
          </p>
        </div>
      </div>
      <!--Se agrego nuevas img-->
      <!-- Se agrego un nuevo comentario Card-->
      <div class="card">
        <div class="imagenes">
          <img src="img/CatMoney.jpeg" alt="Imagen 1" />
          <img src="img/Rabbit.jpeg" alt="Imagen 2" />
        </div>
        <div class="contenido">
          <h3 class="subtitulo">Otra Card</h3>
          <p class="descripcion">
            Aquí puedes agregar otra descripción diferente para mostrar
            contenido.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
